name: Publish

on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Read local version
        id: local
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Local version: $VERSION"

      - name: Check if version is already published
        id: check
        run: |
          if npm view "@robotmoney/cli@${{ steps.local.outputs.version }}" version > /dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.local.outputs.version }} is already on npm. Skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.local.outputs.version }} is new. Will publish."
          fi

      - name: Install dependencies
        if: steps.check.outputs.already_published == 'false'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.check.outputs.already_published == 'false'
        run: pnpm build

      - name: Test
        if: steps.check.outputs.already_published == 'false'
        run: pnpm test

      - name: Publish to npm
        if: steps.check.outputs.already_published == 'false'
        run: pnpm --filter @robotmoney/cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag the release
        if: steps.check.outputs.already_published == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.local.outputs.version }}"
          git push origin "v${{ steps.local.outputs.version }}"
